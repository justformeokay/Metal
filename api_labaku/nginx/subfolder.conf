# ============================================================
# Nginx config: SUBFOLDER deployment
# API runs at: https://ucs.mathlab.id/api
# Server path: /www/wwwroot/ucs.mathlab.id/api
#
# If using CyberPanel: paste the location blocks into the
# site's custom Nginx config via:
#   CyberPanel > Websites > ucs.mathlab.id > Rewrite Rules
# ============================================================

server {
    listen 80;
    listen [::]:80;

    server_name ucs.mathlab.id www.ucs.mathlab.id;

    root /www/wwwroot/ucs.mathlab.id;   # CyberPanel site root
    index index.php;

    access_log /var/log/nginx/ucs.mathlab.id.access.log;
    error_log  /var/log/nginx/ucs.mathlab.id.error.log;

    # ── Main site (if any) ───────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── API subfolder: /api ───────────────────────────────────
    location /api {
        alias /www/wwwroot/ucs.mathlab.id/api;

        # Rewrite all requests to index.php inside the subfolder
        try_files $uri $uri/ @api_fallback;

        location ~ \.php$ {
            include        snippets/fastcgi-php.conf;
            fastcgi_pass   unix:/run/php/php8.2-fpm.sock;  # Adjust PHP version if needed

            fastcgi_param  SCRIPT_FILENAME /www/wwwroot/ucs.mathlab.id/api$fastcgi_script_name;
            include        fastcgi_params;

            # CRITICAL: Pass Authorization header to PHP
            fastcgi_param  HTTP_AUTHORIZATION $http_authorization;
        }
    }

    location @api_fallback {
        rewrite ^/api/(.*)$ /api/index.php?$query_string last;
    }

    # ── PHP-FPM for main site ────────────────────────────────
    location ~ \.php$ {
        include       snippets/fastcgi-php.conf;
        fastcgi_pass  unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include       fastcgi_params;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
    }

    # ── Block sensitive files ────────────────────────────────
    location ~ /\.(env|htaccess|git) {
        deny all;
        return 404;
    }

    location ~ ^/api_labaku/database/ {
        deny all;
        return 404;
    }
}
