# ============================================================
# Labaku API — Nginx Config untuk aaPanel
# Domain  : ucs.mathlab.id
# API path: /www/wwwroot/ucs.mathlab.id/api
#
# Cara apply:
#   OPSI 1 (Recommended — via aaPanel panel):
#     aaPanel > Website > ucs.mathlab.id > Config / Rewrite
#     Paste bagian "REWRITE BLOCK" ke dalam kolom rewrite rules
#
#   OPSI 2 (Manual via SSH):
#     nano /www/server/panel/vhost/rewrite/ucs.mathlab.id.conf
#     Paste bagian "REWRITE BLOCK", lalu:
#     nginx -t && nginx -s reload
# ============================================================

# ============================================================
# FULL SERVER BLOCK (hanya referensi — jangan replace langsung)
# Gunakan REWRITE BLOCK di bawah untuk di-paste ke aaPanel
# ============================================================
server
{
    listen 80;
    server_name ucs.mathlab.id;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/ucs.mathlab.id;

    #SSL-START
    #error_page 404/404.html;
    #SSL-END

    #ERROR-PAGE-START
    error_page 404 /404.html;
    error_page 502 /502.html;
    #ERROR-PAGE-END

    # ── API Subfolder routing ──────────────────────────────
    # Route semua /api/* ke /api/index.php
    location /api {
        try_files $uri $uri/ /api/index.php?$args;
    }

    # PHP handler khusus untuk folder /api
    # Terpisah dari enable-php-84.conf agar bisa inject HTTP_AUTHORIZATION
    location ~ ^/api/.*\.php$ {
        fastcgi_pass   unix:/tmp/php-cgi-84.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;

        # WAJIB: kirim Authorization header ke PHP (diperlukan JWT)
        fastcgi_param  HTTP_AUTHORIZATION $http_authorization;
    }

    # Blok akses ke file .env
    location ~ ^/api/\.env {
        return 404;
    }

    #PHP-INFO-START
    include enable-php-84.conf;
    #PHP-INFO-END

    #REWRITE-START
    include /www/server/panel/vhost/rewrite/ucs.mathlab.id.conf;
    #REWRITE-END

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    location ~ \.well-known{
        allow all;
    }

    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$
    {
        expires      30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    location ~ .*\.(js|css)?$
    {
        expires      12h;
        error_log /dev/null;
        access_log /dev/null;
    }

    access_log  /www/wwwlogs/ucs.mathlab.id.log;
    error_log   /www/wwwlogs/ucs.mathlab.id.error.log;
}


