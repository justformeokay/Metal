# ============================================================
# Nginx config: SUBDOMAIN deployment
# Use this when API runs at: https://api.yourdomain.com
#
# Setup:
#   sudo cp subdomain.conf /etc/nginx/sites-available/labaku-api
#   sudo ln -s /etc/nginx/sites-available/labaku-api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 80;
    listen [::]:80;

    # Change to your actual domain
    server_name api.yourdomain.com;

    # Document root points directly to api_labaku folder
    root /var/www/labaku/api_labaku;
    index index.php;

    # Logging
    access_log /var/log/nginx/labaku-api.access.log;
    error_log  /var/log/nginx/labaku-api.error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Hide PHP version
    fastcgi_hide_header X-Powered-By;

    # ── URL Rewriting (replaces .htaccess) ──────────────────
    # Route all non-file/directory requests to index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM handler ─────────────────────────────────────
    location ~ \.php$ {
        include        snippets/fastcgi-php.conf;
        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;  # Adjust PHP version if needed

        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        # CRITICAL: Pass Authorization header to PHP
        # Without this, JWT auth will NOT work with Nginx
        fastcgi_param  HTTP_AUTHORIZATION $http_authorization;
    }

    # ── Block access to sensitive files ─────────────────────
    location ~ /\.(env|htaccess|git) {
        deny all;
        return 404;
    }

    location ~ /database/ {
        deny all;
        return 404;
    }

    # ── Static file caching ─────────────────────────────────
    location ~* \.(jpg|jpeg|gif|png|css|js|ico|svg)$ {
        expires    max;
        add_header Cache-Control "public, immutable";
    }
}

